services:
  - type: web
    name: invoice-automation
    env: python
    plan: free
    buildCommand: "apt-get update && apt-get install -y tesseract-ocr nodejs npm && cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
