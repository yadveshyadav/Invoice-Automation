services:
  - type: web
    name: invoice-automation-backend
    env: python
    plan: free
    buildCommand: "cd app && pip install -r requirements.txt"
    startCommand: "cd app && uvicorn main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
